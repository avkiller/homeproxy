name: ubuntu lib test

on:
  workflow_dispatch:

  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install Sign Tool
        run: |
          sudo apt-get update
          sudo apt-get install -y signify-openbsd
      - name: Verify usign Installation
        id: check_usign
        run: |
          if ! command -v signify-openbsd &> /dev/null; then
            echo "❌ 错误：当前的 GitHub Actions 宿主机/容器中没有安装 signify-openbsd 签名工具！"
            exit 1
          fi


          if ! command -v usign &> /dev/null; then
            echo "❌ 错误：当前的 GitHub Actions 宿主机/容器中没有安装 usign 签名工具！"
            echo "提示：如果您使用的是纯 ubuntu-latest 镜像，建议在其后添加一行 sudo apt-get install -y signify-openbsd 来作为平替。"
            exit 1
          fi


          echo "usign 状态正常，版本信息如下："
          usign -v || true # 有些版本的 usign 不支持 -v，加 || true 防止误杀报错